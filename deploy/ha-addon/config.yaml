name: "Loom"
description: "IDE-like workspace manager with terminals, file browsing, and GitHub integration"
version: "0.1.13"
slug: "loom"
image: "ghcr.io/{github-owner}/loom-addon-{arch}"
url: "https://github.com/{github-owner}/loom"
arch:
  - aarch64
  - amd64
init: false
startup: application
ingress: true
ingress_port: 8099
panel_icon: "mdi:code-braces"
panel_title: "Loom"
ports:
  80/tcp: 3080
ports_description:
  80/tcp: "Direct Web UI access"
map:
  - addon_config:rw
  - share:rw
options:
  project_directory: "/share/loom-projects"
  anthropic_api_key: ""
schema:
  project_directory: str
  anthropic_api_key: "password?"
