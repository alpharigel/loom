name: Build & Deploy HA Add-on

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: version
        run: |
          CONFIG="deploy/ha-addon/config.yaml"
          CURRENT=$(grep '^version:' "$CONFIG" | sed 's/version: *"\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version: .*/version: \"${NEW}\"/" "$CONFIG"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped version: $CURRENT → $NEW"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Seed GHCR package (first-run workaround)
        run: |
          # First-time push to a new GHCR package fails with 403 when
          # buildx tries to cross-repo blob-mount layers from the HA base
          # image into the as-yet-nonexistent destination repo. Seeding
          # the package with a tiny image pulled from Docker Hub (no
          # GHCR cross-mount involved) creates the package so subsequent
          # pushes have somewhere to mount into. Safe to re-run.
          docker pull busybox:latest
          docker tag busybox:latest ghcr.io/${{ github.repository_owner }}/loom-addon-aarch64:seed
          docker push ghcr.io/${{ github.repository_owner }}/loom-addon-aarch64:seed || true

      - name: Build and push (aarch64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/ha-addon/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: BUILD_FROM=ghcr.io/home-assistant/aarch64-base-debian:bookworm
          tags: |
            ghcr.io/${{ github.repository_owner }}/loom-addon-aarch64:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/loom-addon-aarch64:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/ha-addon/config.yaml
          git commit -m "chore: bump addon version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Update addon-repo branch
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OWNER="${{ github.repository_owner }}"
          TMPDIR=$(mktemp -d)

          cat > "$TMPDIR/repository.yaml" << EOF
          name: Loom Add-ons
          url: https://github.com/${{ github.repository }}
          maintainer: ${OWNER}
          EOF

          mkdir -p "$TMPDIR/loom"
          cp deploy/ha-addon/config.yaml "$TMPDIR/loom/config.yaml"
          # Rewrite placeholders with actual owner
          sed -i "s|{github-owner}|${OWNER}|g" "$TMPDIR/loom/config.yaml"

          cd "$TMPDIR"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b addon-repo
          git add .
          git commit -m "Update addon to v${VERSION}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin addon-repo
